version: "3"

tasks:
  backend:dev:
    desc: Run backend API and embedded SPA server
    env:
      GO_ENV: development
    cmds:
      - go run .
    dir: ./backend

  frontend:install:
    desc: Install frontend dependencies
    cmds:
      - npm --prefix frontend install

  frontend:dev:
    desc: Run frontend Vite dev server
    cmds:
      - npm --prefix frontend run dev

  frontend:build:
    desc: Build frontend bundle into backend/internal/webui/dist
    cmds:
      - npm --prefix frontend run build

  api:generate:spec:
    desc: Export OpenAPI spec from Go backend
    cmds:
      - go run . openapi > {{.ROOT_DIR}}/api/openapi.yaml
    dir: ./backend

  api:generate:client:
    desc: Generate typed TypeScript client from OpenAPI spec
    cmds:
      - npm --prefix frontend run generate:api

  api:generate:
    desc: Regenerate the OpenAPI spec and typed client
    cmds:
      - task api:generate:spec
      - task api:generate:client

  dev:
    desc: Start backend and frontend development servers
    cmds:
      - task frontend:install
      - task api:generate
      - task --parallel backend:dev frontend:dev

  build:
    desc: Build frontend and backend binaries
    cmds:
      - task frontend:install
      - task api:generate
      - task frontend:build
      - go -C backend build ./...

  test:
    desc: Run all tests (backend + frontend)
    cmds:
      - task frontend:install
      - task api:generate
      - task frontend:build
      - go -C backend test ./...
      - npm --prefix frontend run test

  ko:local:
    desc: Build and publish image to the local daemon with ko
    cmds:
      - task frontend:install
      - task api:generate
      - task frontend:build
      - ko build --local --bare ./backend

  docs:
    desc: Run docs locally with docker
    vars:
      ZENSICAL_VERSION:
        sh: |
          grep -oP 'ZENSICAL_VERSION: \K[^[:space:]]+' {{.ROOT_DIR}}/.github/workflows/docs.yml
    cmds:
      - docker run --rm -p 8000:8000 -u $(id -u):$(id -g) -v "{{.ROOT_DIR}}:/app" -w /app zensical/zensical:{{.ZENSICAL_VERSION}}