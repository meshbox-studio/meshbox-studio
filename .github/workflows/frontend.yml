name: Frontend

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm --prefix frontend ci --legacy-peer-deps

      - name: Test
        run: npm --prefix frontend run test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm --prefix frontend ci --legacy-peer-deps

      - name: Prepare Nuxt
        run: npm --prefix frontend run prepare

      - name: Lint
        run: npm --prefix frontend run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm --prefix frontend ci --legacy-peer-deps

      - name: Generate API types
        run: npm --prefix frontend run generate:api

      - name: Typecheck
        run: npm --prefix frontend run typecheck
