name: Documentation

on:
  push: &push
    branches:
      - main
    paths:
      - docs/**
      - .github/workflows/docs.yml
      - zensical.toml
  pull_request: *push
  release:
    types:
      - prereleased
      - published

permissions:
  contents: read
  pages: write
  id-token: write

env:
  # renovate: datasource=docker depName=zensical/zensical versioning=semver
  ZENSICAL_VERSION: zensical/zensical:0.0.31

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build docs with zensical container
        run: |
          docker run --rm \
            -v "$PWD:/workspace" \
            -w /workspace \
            $ZENSICAL_VERSION \
            build --clean
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site
      - uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
        if: github.ref == 'refs/heads/main'
