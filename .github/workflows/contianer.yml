name: Container

on:
  push:
    branches:
      - main
    tags:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26'

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "lts/*"

      - name: Setup ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9

      - name: Install Task
        uses: go-task/setup-task@v2
        with:
          version: 3.x

      - name: Install frontend dependencies
        run: npm --prefix frontend ci --legacy-peer-deps

      - name: Generate API types
        run: npm --prefix frontend run generate:api

      - name: Build frontend assets
        run: npm --prefix frontend run build

      - name: Determine image tags
        id: meta
        run: |
          SHA="$(git rev-parse --short HEAD)"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            if [[ "${VERSION}" == *-* ]]; then
              echo "tags=${VERSION},${SHA}" >> "$GITHUB_OUTPUT"
            else
              MAJOR="${VERSION%%.*}"
              MINOR="${VERSION%.*}"
              echo "tags=${VERSION},${MINOR},${MAJOR},${SHA}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tags=${SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push
        working-directory: backend
        run: ko build --tags="${{ steps.meta.outputs.tags }}" --bare .
