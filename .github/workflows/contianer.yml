name: Container

on:
  push:
    branches:
      - main
    tags:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Setup ko
        uses: ko-build/setup-ko@v0.9

      - name: Setup task
        env:
          TASK_VERSION: v3.49.1
          TASK_CHECKSUM: 4e7d24f1bf38218aec8f244eb7ba671f898830f9f87b3c9b30ff1c09e3135576
        run: |
          TASK_ARCHIVE="$(mktemp)"
          curl -fsSL -o "$TASK_ARCHIVE" "https://github.com/go-task/task/releases/download/${TASK_VERSION}/task_linux_amd64.tar.gz"
          echo "${TASK_CHECKSUM}  ${TASK_ARCHIVE}" | sha256sum -c -
          tar -xzf "$TASK_ARCHIVE" -C /usr/local/bin task
          chmod +x /usr/local/bin/task

      - name: Install Tailwind CLI
        env:
          TAILWIND_VERSION: 4.2.2
          TAILWIND_CHECKSUM: 4ab84f2b496c402d3ec4fd25e0e5559fe1184d886dadae8fb4438344ec044c22
        run: |
          curl -fsSL -o /usr/local/bin/tailwindcss "https://github.com/tailwindlabs/tailwindcss/releases/download/v${TAILWIND_VERSION}/tailwindcss-linux-x64"
          echo "${TAILWIND_CHECKSUM}  /usr/local/bin/tailwindcss" | sha256sum -c -
          chmod +x /usr/local/bin/tailwindcss

      - name: Generate templ
        run: go tool templ generate

      - name: Generate CSS assets
        run: task tailwind:build

      - name: Determine image tags
        id: meta
        run: |
          SHA="$(git rev-parse --short HEAD)"
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
            if [[ "${VERSION}" == *-* ]]; then
              # Pre-release tag (e.g. 1.0.0-prerelease.1): only exact tag + sha
              echo "tags=${VERSION},${SHA}" >> "$GITHUB_OUTPUT"
            else
              # Release tag (e.g. 1.1.1): floating major/minor tags + sha
              MAJOR="${VERSION%%.*}"
              MINOR="${VERSION%.*}"
              echo "tags=${VERSION},${MINOR},${MAJOR},${SHA}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "tags=${SHA}" >> "$GITHUB_OUTPUT"
          fi
          echo "Determined tags: ${GITHUB_OUTPUT}"

      - name: Build and push
        run: ko build --tags="${{ steps.meta.outputs.tags }}" --bare ./cmd/meshbox-studio
